id: family-tax-credit
name: Family Tax Credit
category: family
frequency: weekly
taxable: false
legal_basis: "Tax Administration Act 1994, Part M"
source_url: "https://www.ird.govt.nz/working-for-families/family-tax-credit"
description: "Base Working for Families payment for families with dependent children, administered by Inland Revenue"
eligibility:
  min_age: null
  max_age: null
  residency: [citizen, permanent_resident]
  requires_benefit: false
  requires_application: true
  rules:
    - fact: has_children
      op: eq
      value: true
  conditions:
    - "Must have dependent children under 18 (or 18-19 if still at school)"
    - "Must be the principal caregiver"
    - "Income tested"
rates:
  effective: "2026-04-01"
  max_weekly: "$127.73 per week for eldest child; $104.26 per week for subsequent children"
income_test:
  applies: true
  note: "Abatement begins at $42,700 family income"
asset_test:
  applies: false
friction:
  documentation_required:
    - "IRD number"
    - "Birth certificates of children"
    - "Income details"
  typical_processing: "2-4 weeks"
  known_issues:
    - "Administered by IRD, not MSD"
    - "Requires annual income reconciliation"
    - "Overpayments if income increases during year"
  deflection_patterns: []
