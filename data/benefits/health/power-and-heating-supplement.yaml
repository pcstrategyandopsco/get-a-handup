id: power-and-heating-supplement
name: Power and Heating Supplement
category: health
frequency: weekly
taxable: false
legal_basis: "Social Security Act 2018"
source_url: "https://www.workandincome.govt.nz/products/a-z-benefits/disability-allowance.html"
description: "Weekly assistance with extra power and heating costs due to health conditions requiring additional warmth or medical equipment"
eligibility:
  min_age: null
  max_age: null
  residency: [citizen, permanent_resident]
  requires_benefit: false
  requires_application: true
  rules:
    - fact: has_condition
      op: eq
      value: true
    - fact: has_extra_power_costs
      op: eq
      value: true
  conditions:
    - "Must have a health condition requiring additional heating or power usage"
    - "Must have higher than normal power costs due to health needs"
    - "Often assessed as part of Disability Allowance"
rates:
  effective: "2026-04-01"
  description: "varies based on additional power costs and household circumstances"
income_test:
  applies: true
friction:
  documentation_required:
    - "Medical certificate confirming need for additional heating or power"
    - "Recent power bills showing usage"
    - "Income verification"
  typical_processing: "2-3 weeks"
  known_issues:
    - "May require comparison with 'normal' household power usage"
    - "Seasonal variations in costs can complicate assessments"
  deflection_patterns:
    - "Staff may suggest energy efficiency measures instead"
    - "May question whether condition truly requires extra power"
