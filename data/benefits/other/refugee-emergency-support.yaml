id: refugee-emergency-support
name: Refugee Emergency Support
category: other
frequency: one-off
taxable: false
legal_basis: "Social Security Act 2018"
source_url: "https://www.workandincome.govt.nz/products/a-z-benefits/refugee-support.html"
description: "Initial support package for quota refugees arriving in New Zealand, covering immediate needs during resettlement period"
eligibility:
  min_age: null
  max_age: null
  residency: [citizen, permanent_resident]
  requires_benefit: false
  requires_application: true
  rules:
    - fact: is_refugee
      op: eq
      value: true
    - fact: recently_arrived
      op: eq
      value: true
  conditions:
    - "Must be a quota refugee recently arrived in New Zealand"
    - "Support covers initial resettlement period (typically 6-12 months)"
    - "Usually coordinated with refugee resettlement agencies"
    - "May include accommodation, household items, and orientation support"
rates:
  effective: "2026-04-01"
  description: "varies based on family size and resettlement needs"
income_test:
  applies: false
friction:
  documentation_required:
    - "Refugee status documentation"
    - "Immigration paperwork"
    - "Identification documents"
    - "Resettlement agency referral"
  typical_processing: "arranged prior to or immediately upon arrival"
  known_issues:
    - "Complex coordination between multiple agencies"
    - "Cultural and language barriers in accessing support"
    - "Support may not cover all actual needs"
  deflection_patterns:
    - "Expectation that resettlement agencies handle all support needs"
