id: independent-earner-tax-credit
name: Independent Earner Tax Credit
category: other
frequency: annual
taxable: false
legal_basis: "section MA 7 Income Tax Act 2007"
source_url: "https://www.ird.govt.nz/income-tax/income-tax-for-individuals/what-happens-at-the-end-of-the-tax-year/independent-earner-tax-credit"
description: "A $10/week ($520/year) tax credit for earners between $24,000 and $48,000 who are not receiving a main benefit or Working for Families. Administered by IRD, claimed through tax return."

eligibility:
  min_age: 18
  max_age: null
  residency: [citizen, permanent_resident]
  requires_benefit: false
  requires_application: false
  rules:
    - fact: is_employed
      op: eq
      value: true
    - fact: annual_income
      op: gte
      value: 24000
    - fact: annual_income
      op: lte
      value: 48000
    - fact: on_main_benefit
      op: eq
      value: false
  conditions:
    - "Must earn between $24,000 and $48,000 per year"
    - "Must not be receiving a main benefit (Jobseeker, SLP, SPS, etc.)"
    - "Must not be receiving Working for Families tax credits"

rates:
  effective: "2026-04-01"
  max_annual: "$520"
  description: "$10 per week tax credit, abates above $44,000"

income_test:
  applies: true
  description: "Full credit at $24,000-$44,000. Abates at 13c per dollar from $44,000 to $48,000"

friction:
  documentation_required:
    - "IR3 tax return or personal tax summary"
  typical_processing: "End of tax year"
  known_issues:
    - "Many eligible people do not claim because they don't file an IR3"
    - "Not available to anyone receiving a main benefit or WFF"
  deflection_patterns: []
