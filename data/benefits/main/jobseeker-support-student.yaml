id: jobseeker-support-student
name: Jobseeker Support - Student Hardship
category: main
frequency: weekly
taxable: true
legal_basis: "section 88 Social Security Act 2018"
source_url: "https://www.workandincome.govt.nz/products/a-z-benefits/jobseeker-support.html"
description: "Temporary support for full-time students who are unable to support themselves during study breaks between terms"

eligibility:
  min_age: 18
  max_age: null
  residency: [citizen, permanent_resident]
  residence_years: 2
  requires_benefit: false
  requires_application: true
  rules:
    - fact: age
      op: gte
      value: 18
    - fact: is_student
      op: eq
      value: true
    - fact: in_study_break
      op: eq
      value: true
    - fact: residency_status
      op: in
      value: [citizen, permanent_resident]
    - fact: years_in_nz
      op: gte
      value: 2
  conditions:
    - "Must be 18 years or older"
    - "Must be enrolled as a full-time student"
    - "Must be in a study break between terms"
    - "Must be unable to support yourself during the break"
    - "Must be a New Zealand citizen or permanent resident"
    - "Must have been resident in New Zealand for at least 2 years"

rates:
  effective: "2026-04-01"
  max_weekly: "$253.81"
  description: "Temporary rate during study breaks. Lower than standard Jobseeker Support"

income_test:
  applies: true
  description: "Income from work and other sources is tested. Student allowance and loan living costs are also considered"

asset_test:
  applies: true
  single: 8100
  couple_or_sole_parent: 16200

friction:
  documentation_required:
    - "Proof of identity"
    - "Proof of full-time student enrollment"
    - "Confirmation of study break dates"
    - "Bank account details"
  typical_processing: "1-2 weeks"
  known_issues:
    - "Temporary nature means re-application required for each study break"
    - "May conflict with student allowance eligibility"
  deflection_patterns:
    - "May be directed to student allowance instead"
