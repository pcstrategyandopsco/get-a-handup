id: young-parent-payment
name: Young Parent Payment
category: main
frequency: weekly
taxable: true
legal_basis: "section 174 Social Security Act 2018"
source_url: "https://www.workandincome.govt.nz/products/a-z-benefits/young-parent-payment.html"
description: "Weekly payment for young parents aged 16-19 years with dependent children, with requirements to participate in budgeting and parenting programs"

eligibility:
  min_age: 16
  max_age: 19
  residency: [citizen, permanent_resident]
  residence_years: 2
  requires_benefit: false
  requires_application: true
  rules:
    - fact: age
      op: gte
      value: 16
    - fact: age
      op: lte
      value: 19
    - fact: has_children
      op: eq
      value: true
    - fact: residency_status
      op: in
      value: [citizen, permanent_resident]
    - fact: years_in_nz
      op: gte
      value: 2
  conditions:
    - "Must be aged between 16 and 19 years"
    - "Must have one or more dependent children"
    - "Must participate in budgeting and parenting programs"
    - "Must be a New Zealand citizen or permanent resident"
    - "Must have been resident in New Zealand for at least 2 years"

rates:
  effective: "2026-04-01"
  max_weekly: "$253.81"
  description: "Base rate for young parent. Additional amounts may apply for dependent children"

income_test:
  applies: true
  description: "Income from work and other sources is tested. Abatement applies to income over certain thresholds"

asset_test:
  applies: true
  single: 8100
  couple_or_sole_parent: 16200

friction:
  documentation_required:
    - "Proof of identity"
    - "Birth certificates for dependent children"
    - "Proof of parental responsibility"
    - "Bank account details"
  typical_processing: "1-2 weeks"
  known_issues:
    - "Mandatory participation in budgeting and parenting programs can be demanding"
    - "Young parents may face additional scrutiny and support requirements"
    - "Transitions to Sole Parent Support at age 20"
  deflection_patterns: []
