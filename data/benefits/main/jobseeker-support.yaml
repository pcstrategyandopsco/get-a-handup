id: jobseeker-support
name: Jobseeker Support
category: main
frequency: weekly
taxable: true
legal_basis: "section 88 Social Security Act 2018"
source_url: "https://www.workandincome.govt.nz/products/a-z-benefits/jobseeker-support.html"
description: "Main unemployment or sickness benefit for people aged 18 and over who are available for work or have a health condition affecting their work capacity"

eligibility:
  min_age: 18
  max_age: null
  residency: [citizen, permanent_resident]
  residence_years: 2
  requires_benefit: false
  requires_application: true
  rules:
    - fact: age
      op: gte
      value: 18
    - fact: residency_status
      op: in
      value: [citizen, permanent_resident]
    - fact: years_in_nz
      op: gte
      value: 2
    - fact: is_seeking_work
      op: eq
      value: true
  conditions:
    - "Must be 18 years or older"
    - "Must be a New Zealand citizen or permanent resident"
    - "Must have been resident in New Zealand for at least 2 years"
    - "Must be actively seeking work or have a health condition preventing full-time work"

rates:
  effective: "2026-04-01"
  max_weekly: "$337.74"
  description: "Rate for single person aged 25 and over. Lower rates apply for those aged 18-24 and higher rates for couples and those with children"

income_test:
  applies: true
  description: "Income from work and other sources is tested. Abatement applies to income over certain thresholds"
  thresholds:
    - weekly: 160
      abatement_rate: 0.70

asset_test:
  applies: true
  single: 8100
  couple_or_sole_parent: 16200

friction:
  documentation_required:
    - "Proof of identity"
    - "Proof of residency"
    - "Bank account details"
    - "Medical certificate if applying on health grounds"
  typical_processing: "1-2 weeks"
  known_issues:
    - "Work test obligations can be challenging for some applicants"
    - "Medical evidence requirements may cause delays"
  deflection_patterns: []

advocacy:
  appointment_strategy: >
    Jobseeker Support has two variants: standard (seeking work) and Health
    Condition or Disability (JS-HCD, for those with a medical condition
    affecting work capacity of 15-30 hours). If you have a health condition,
    ensure you are assessed for JS-HCD — it has different work test obligations.
    Know your sanction rights: missed appointments require proper notification
    under s102-117 SSA 2018.

  talking_points:
    - "I am applying for Jobseeker Support [standard / Health Condition or Disability variant]"
    - "I have my medical certificate confirming [condition] if applying on health grounds"
    - "I understand my work test obligations and want them clearly explained in writing"
    - "If my benefit is ever reduced or suspended, I want written notice with reasons and my review rights"

  common_objections:
    - objection: "You need to apply for more jobs each week"
      counter: "I want to understand my specific work test obligations in writing. The obligations should reflect my circumstances including any health conditions."
      cite: "s88 Social Security Act 2018"
    - objection: "Your medical certificate isn't sufficient for JS-HCD"
      counter: "What specifically is insufficient? My doctor has confirmed my condition and its effect on my work capacity. What additional information do you require?"
    - objection: "You missed your seminar/appointment so your benefit is being cut"
      counter: "Was I properly notified of this appointment under s102 SSA 2018? I need to see the notification record. If notification was inadequate, the sanction is not valid."
      cite: "s102 Social Security Act 2018"

  escalation_triggers:
    - trigger: "Benefit sanctioned for missed obligation"
      action: "Request evidence of proper notification immediately. Check if the sanction follows the correct process under s102-117 SSA 2018. File a Review of Decision if notification was inadequate."
    - trigger: "Placed on standard JS when health condition exists"
      action: "Request assessment for JS-HCD variant with medical evidence. The different work test obligations matter for your wellbeing and compliance."
    - trigger: "Work test obligations seem unreasonable given circumstances"
      action: "Request a review of your obligations. They should be tailored to your individual circumstances including health, caring responsibilities, and transport access."
