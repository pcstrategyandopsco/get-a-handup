id: he-poutama-rangatahi
name: He Poutama Rangatahi
category: employment
frequency: as-needed
taxable: false
legal_basis: "Social Security Act 2018, Part 2"
source_url: "https://www.workandincome.govt.nz/products/a-z-benefits/he-poutama-rangatahi.html"
description: "Youth employment programme for young people not in education, employment or training (NEETs) providing mentoring, training and job placement"
eligibility:
  min_age: null
  max_age: 24
  residency: [citizen, permanent_resident]
  requires_benefit: false
  requires_application: true
  rules:
    - fact: age
      op: lte
      value: 24
    - fact: not_in_education
      op: eq
      value: true
    - fact: not_employed
      op: eq
      value: true
  conditions:
    - "Must be aged 24 or under"
    - "Must not be in education, employment or training"
    - "Must be willing to participate in programme activities"
    - "Must engage with youth mentors and support workers"
rates:
  effective: "2026-04-01"
  description: "varies - programme provided at no cost, includes training, mentoring, work placement support"
income_test:
  applies: false
friction:
  documentation_required:
    - "Proof of age"
    - "Evidence of NEET status"
    - "Referral or self-referral"
  typical_processing: "1-2 weeks"
  known_issues:
    - "Programme availability varies by region"
    - "Some young people reluctant to engage with formal programmes"
  deflection_patterns:
    - "Youth may not identify with NEET label"
    - "Transport and location barriers for rural youth"
