id: skills-for-industry
name: Skills for Industry
category: employment
frequency: as-needed
taxable: false
legal_basis: "Social Security Act 2018, Part 2"
source_url: "https://www.workandincome.govt.nz/products/a-z-benefits/skills-for-industry.html"
description: "Industry-specific training programmes designed to provide skills for sectors with identified labour shortages"
eligibility:
  min_age: null
  max_age: null
  residency: [citizen, permanent_resident]
  requires_benefit: false
  requires_application: true
  rules:
    - fact: is_seeking_work
      op: eq
      value: true
    - fact: interested_in_training
      op: eq
      value: true
  conditions:
    - "Must be actively seeking work"
    - "Must be interested in training for industries with labour shortages"
    - "Must be willing to commit to training programme"
    - "May need to meet specific industry requirements"
rates:
  effective: "2026-04-01"
  description: "varies - training provided at no cost, may include equipment and materials"
income_test:
  applies: false
friction:
  documentation_required:
    - "Application form"
    - "Assessment of suitability for industry"
    - "Any required medical or safety certifications"
  typical_processing: "3-4 weeks"
  known_issues:
    - "Limited to specific industries and regions"
    - "Training schedules may not suit all circumstances"
  deflection_patterns:
    - "Training may not be available in all regions"
    - "Industry prerequisites may exclude some applicants"
