id: work-confidence
name: Work Confidence Programme
category: employment
frequency: as-needed
taxable: false
legal_basis: "Social Security Act 2018, Part 2"
source_url: "https://www.workandincome.govt.nz/products/a-z-benefits/work-confidence.html"
description: "Programme to build work confidence and skills for people who face barriers returning to or entering the workforce"
eligibility:
  min_age: null
  max_age: null
  residency: [citizen, permanent_resident]
  requires_benefit: true
  requires_application: true
  rules:
    - fact: on_benefit
      op: eq
      value: true
    - fact: is_seeking_work
      op: eq
      value: true
    - fact: low_work_confidence
      op: eq
      value: true
  conditions:
    - "Must be receiving a benefit"
    - "Must be seeking work"
    - "Must have low work confidence or barriers to employment"
    - "Must be willing to participate in workshops and activities"
rates:
  effective: "2026-04-01"
  description: "varies - programme provided at no cost, may include travel reimbursement"
income_test:
  applies: false
friction:
  documentation_required:
    - "Referral from case manager"
    - "Assessment of work readiness"
  typical_processing: "2-3 weeks for placement"
  known_issues:
    - "Limited availability in rural areas"
    - "Programme participation may be mandatory for some beneficiaries"
  deflection_patterns:
    - "Voluntary vs mandatory participation can affect engagement"
    - "Some clients report programme not matched to their needs"
